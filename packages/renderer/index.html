<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Pinyon+Script&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <style>
      :root {
        --boot-hull-deep: #060818;
        --boot-hull-mid: #0c1230;
        --boot-gold-bright: #f5da9c;
        --boot-gold-warm: #e0c489;
        --boot-gold-deep: #a8854a;
        --boot-marble-warm: #d8c8a3;
        --boot-marble-ivory: #f1e6cc;
        --boot-hymn-soft: #b89ed8;
        --boot-pyrefly: #f5da9c;
      }

      #spira-boot-shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        overflow: hidden;
        color: var(--boot-marble-ivory);
        font-family: "Lora", Georgia, serif;
        background:
          radial-gradient(ellipse at 50% 110%, rgba(245, 218, 156, 0.08), transparent 48%),
          radial-gradient(ellipse at 18% 62%, rgba(146, 227, 218, 0.04), transparent 52%),
          linear-gradient(180deg, #050715 0%, #080b22 52%, #050715 100%);
      }

      #spira-boot-shell[hidden] {
        display: none;
      }

      .spira-boot-stage {
        position: relative;
        width: min(680px, 100%);
        min-height: 360px;
        display: grid;
        place-items: center;
      }

      .spira-boot-skyline {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 110px;
        opacity: 0.42;
        pointer-events: none;
      }

      .spira-boot-pyrefly {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: radial-gradient(
          circle at center,
          rgba(255, 248, 220, 0.96),
          rgba(245, 218, 156, 0.66) 38%,
          transparent 72%
        );
        box-shadow: 0 0 14px rgba(245, 218, 156, 0.5), 0 0 28px rgba(245, 218, 156, 0.3);
        opacity: 0;
        animation-name: spira-boot-pyrefly-arc;
        animation-timing-function: cubic-bezier(0.22, 0.6, 0.32, 1);
        animation-fill-mode: forwards;
        will-change: transform, opacity;
      }

      .spira-boot-pyrefly:nth-child(1) {
        --start-x: -260px; --start-y: -120px;
        animation-delay: 0.05s; animation-duration: 1.05s;
      }
      .spira-boot-pyrefly:nth-child(2) {
        --start-x: 280px; --start-y: -140px;
        animation-delay: 0.12s; animation-duration: 1.1s;
      }
      .spira-boot-pyrefly:nth-child(3) {
        --start-x: -310px; --start-y: 90px;
        animation-delay: 0.18s; animation-duration: 1.15s;
      }
      .spira-boot-pyrefly:nth-child(4) {
        --start-x: 320px; --start-y: 110px;
        animation-delay: 0.22s; animation-duration: 1.18s;
      }
      .spira-boot-pyrefly:nth-child(5) {
        --start-x: -180px; --start-y: -210px;
        animation-delay: 0.28s; animation-duration: 1.2s;
      }
      .spira-boot-pyrefly:nth-child(6) {
        --start-x: 220px; --start-y: -230px;
        animation-delay: 0.32s; animation-duration: 1.22s;
      }
      .spira-boot-pyrefly:nth-child(7) {
        --start-x: -360px; --start-y: -30px;
        animation-delay: 0.38s; animation-duration: 1.18s;
      }
      .spira-boot-pyrefly:nth-child(8) {
        --start-x: 380px; --start-y: 20px;
        animation-delay: 0.42s; animation-duration: 1.18s;
      }
      .spira-boot-pyrefly:nth-child(9) {
        --start-x: 60px; --start-y: -260px;
        animation-delay: 0.48s; animation-duration: 1.2s;
      }
      .spira-boot-pyrefly:nth-child(10) {
        --start-x: -80px; --start-y: 240px;
        animation-delay: 0.52s; animation-duration: 1.22s;
      }
      .spira-boot-pyrefly:nth-child(11) {
        --start-x: 140px; --start-y: 230px;
        animation-delay: 0.58s; animation-duration: 1.18s;
      }
      .spira-boot-pyrefly:nth-child(12) {
        --start-x: -150px; --start-y: -180px;
        animation-delay: 0.62s; animation-duration: 1.18s;
      }

      @keyframes spira-boot-pyrefly-arc {
        0% { transform: translate(var(--start-x), var(--start-y)) scale(0.4); opacity: 0; }
        15% { opacity: 0.95; }
        88% { opacity: 0.85; }
        100% { transform: translate(0, 0) scale(0.7); opacity: 0; }
      }

      .spira-boot-orb {
        position: relative;
        width: 92px;
        height: 92px;
        border-radius: 999px;
        opacity: 0;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 252, 232, 0.96) 0%, rgba(245, 218, 156, 0.7) 30%, rgba(168, 133, 74, 0.18) 64%, transparent 80%);
        box-shadow:
          0 0 24px rgba(245, 218, 156, 0.42),
          0 0 60px rgba(245, 218, 156, 0.22),
          inset 0 0 18px rgba(255, 248, 220, 0.6);
        animation: spira-boot-orb-form 1.2s ease-out 1.0s forwards;
      }

      @keyframes spira-boot-orb-form {
        0% { opacity: 0; transform: scale(0.4); }
        50% { opacity: 1; transform: scale(1.18); }
        100% { opacity: 0.95; transform: scale(1); }
      }

      .spira-boot-hymn {
        position: absolute;
        left: 50%;
        top: 38%;
        transform: translate(-50%, -50%);
        font-family: "Pinyon Script", cursive;
        font-size: 64px;
        line-height: 1;
        letter-spacing: 0.04em;
        color: var(--boot-hymn-soft);
        opacity: 0;
        white-space: nowrap;
        text-shadow: 0 0 18px rgba(184, 158, 216, 0.2);
        pointer-events: none;
        animation: spira-boot-hymn-fade 2.2s ease-out 0.6s forwards;
      }

      @keyframes spira-boot-hymn-fade {
        0% { opacity: 0; }
        25% { opacity: 0.14; }
        70% { opacity: 0.06; }
        100% { opacity: 0.04; }
      }

      .spira-boot-wordmark {
        position: relative;
        z-index: 2;
        margin-top: 200px;
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .spira-boot-title {
        margin: 0;
        font-family: "Cinzel", serif;
        font-weight: 600;
        font-size: 56px;
        letter-spacing: 0.32em;
        color: var(--boot-gold-bright);
        text-shadow: 0 0 26px rgba(245, 218, 156, 0.32);
      }

      .spira-boot-title span {
        display: inline-block;
        opacity: 0;
        transform: translateY(8px);
        animation: spira-boot-letter 0.6s ease-out forwards;
      }

      .spira-boot-title span:nth-child(1) { animation-delay: 0.95s; }
      .spira-boot-title span:nth-child(2) { animation-delay: 1.08s; }
      .spira-boot-title span:nth-child(3) { animation-delay: 1.21s; }
      .spira-boot-title span:nth-child(4) { animation-delay: 1.34s; }
      .spira-boot-title span:nth-child(5) { animation-delay: 1.47s; }

      @keyframes spira-boot-letter {
        from { opacity: 0; transform: translateY(8px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      .spira-boot-arch {
        width: 280px;
        height: 14px;
        opacity: 0;
        animation: spira-boot-arch-fade 0.8s ease-out 1.7s forwards;
      }

      @keyframes spira-boot-arch-fade {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 0.78; transform: translateY(0); }
      }

      .spira-boot-message {
        margin: 0;
        max-width: 480px;
        text-align: center;
        opacity: 0;
        font-family: "Cinzel", serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--boot-gold-warm);
        animation: spira-boot-subtitle-fade 0.8s ease-out 1.85s forwards;
      }

      @keyframes spira-boot-subtitle-fade {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 0.86; transform: translateY(0); }
      }

      .spira-boot-eyebrow {
        display: none;
      }

      .spira-boot-actions {
        margin-top: 28px;
        display: flex;
        justify-content: center;
        gap: 14px;
      }

      .spira-boot-reload {
        padding: 11px 22px;
        border: 1px solid var(--boot-gold-warm);
        border-radius: 4px;
        background: rgba(245, 218, 156, 0.06);
        color: var(--boot-gold-bright);
        cursor: pointer;
        font-family: "Cinzel", serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .spira-boot-reload:hover {
        background: rgba(245, 218, 156, 0.14);
        border-color: var(--boot-gold-bright);
      }

      .spira-boot-reload[hidden],
      .spira-boot-details[hidden] {
        display: none;
      }

      .spira-boot-details {
        margin: 22px auto 0;
        max-width: 580px;
        max-height: 200px;
        overflow: auto;
        border: 1px solid rgba(245, 218, 156, 0.18);
        border-radius: 4px;
        background: rgba(6, 9, 24, 0.78);
        padding: 14px;
        color: rgba(216, 200, 163, 0.84);
        font-family: "JetBrains Mono", "Cascadia Code", monospace;
        font-size: 11px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .spira-boot-failure-mode .spira-boot-orb,
      .spira-boot-failure-mode .spira-boot-pyrefly,
      .spira-boot-failure-mode .spira-boot-hymn,
      .spira-boot-failure-mode .spira-boot-arch {
        display: none;
      }

      .spira-boot-failure-mode .spira-boot-wordmark {
        margin-top: 0;
      }

      .spira-boot-failure-mode #spira-boot-title {
        font-size: 26px;
        letter-spacing: 0.18em;
      }

      .spira-boot-failure-mode .spira-boot-message {
        max-width: 580px;
        font-family: "Lora", Georgia, serif;
        font-size: 15px;
        font-style: italic;
        font-weight: 400;
        letter-spacing: 0;
        text-transform: none;
        color: var(--boot-marble-warm);
        opacity: 1;
        animation: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .spira-boot-pyrefly { display: none; }
        .spira-boot-orb,
        .spira-boot-hymn,
        .spira-boot-arch,
        .spira-boot-message,
        .spira-boot-title span {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
          filter: none !important;
        }
      }

      #root {
        opacity: 0;
        transition: opacity 0.36s ease-out;
      }

      #root[data-spira-ready="true"] {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="spira-boot-shell" role="status" aria-live="polite">
      <div class="spira-boot-stage">
        <svg class="spira-boot-skyline" viewBox="0 0 800 110" aria-hidden="true" preserveAspectRatio="xMidYEnd meet">
          <defs>
            <linearGradient id="spira-boot-skyline-gradient" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#1a1f4a" stop-opacity="0" />
              <stop offset="1" stop-color="#0a1030" stop-opacity="0.9" />
            </linearGradient>
          </defs>
          <path
            d="M0 110 L0 78 L40 80 L60 56 L72 70 L96 50 L110 70 L132 44 L150 64 L172 38 L196 64 L214 48 L240 70 L264 32 L288 60 L308 48 L332 60 L356 26 L382 62 L408 50 L432 64 L460 30 L488 58 L514 44 L538 60 L564 36 L590 60 L614 50 L640 66 L662 42 L688 60 L716 36 L740 60 L770 50 L800 70 L800 110 Z"
            fill="url(#spira-boot-skyline-gradient)"
          />
        </svg>

        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>
        <span class="spira-boot-pyrefly"></span>

        <div class="spira-boot-hymn" aria-hidden="true">Ieyui&nbsp;·&nbsp;Nobomeno</div>

        <div class="spira-boot-orb" aria-hidden="true"></div>

        <div class="spira-boot-wordmark">
          <span class="spira-boot-eyebrow">Spira renderer</span>
          <h1 id="spira-boot-title" class="spira-boot-title">
            <span>S</span><span>P</span><span>I</span><span>R</span><span>A</span>
          </h1>

          <svg class="spira-boot-arch" viewBox="0 0 280 14" aria-hidden="true">
            <path
              d="M2 12 Q140 -2 278 12"
              fill="none"
              stroke="var(--boot-gold-warm)"
              stroke-width="1.2"
              stroke-linecap="round"
            />
            <circle cx="140" cy="3" r="1.6" fill="var(--boot-gold-bright)" />
          </svg>

          <p id="spira-boot-message" class="spira-boot-message">Shinra · Command Interface</p>

          <div class="spira-boot-actions">
            <button id="spira-boot-reload" class="spira-boot-reload" type="button" hidden>Return to Spira</button>
          </div>
          <pre id="spira-boot-details" class="spira-boot-details" hidden></pre>
        </div>
      </div>
    </div>
    <div id="root" hidden></div>
    <script>
      (() => {
        const shell = document.getElementById("spira-boot-shell");
        const root = document.getElementById("root");
        const titleNode = document.getElementById("spira-boot-title");
        const messageNode = document.getElementById("spira-boot-message");
        const detailsNode = document.getElementById("spira-boot-details");
        const reloadButton = document.getElementById("spira-boot-reload");
        let ready = false;

        const trimDetails = (value) => {
          if (typeof value !== "string") {
            return "";
          }

          const trimmed = value.trim();
          return trimmed.slice(0, 8000);
        };

        const describeError = (value) => {
          if (value && typeof value === "object" && "title" in value && "message" in value) {
            return {
              title: typeof value.title === "string" && value.title ? value.title : "Spira couldn't finish loading",
              message:
                typeof value.message === "string" && value.message
                  ? value.message
                  : "A renderer error stopped the interface before it could recover.",
              details: trimDetails(typeof value.details === "string" ? value.details : ""),
              phase: value.phase === "runtime" ? "runtime" : "bootstrap",
            };
          }

          if (value instanceof Error) {
            return {
              title: "Spira couldn't finish loading",
              message: value.message
                ? `A renderer error stopped the interface before it finished loading: ${value.message}`
                : "A renderer error stopped the interface before it finished loading.",
              details: trimDetails(value.stack || value.message || ""),
              phase: "bootstrap",
            };
          }

          if (typeof value === "string" && value.trim()) {
            return {
              title: "Spira couldn't finish loading",
              message: `A renderer error stopped the interface before it finished loading: ${value.trim()}`,
              details: "",
              phase: "bootstrap",
            };
          }

          return {
            title: "Spira couldn't finish loading",
            message: "A renderer error stopped the interface before it finished loading.",
            details: "",
            phase: "bootstrap",
          };
        };

        const reportFatal = (payload) => {
          if (typeof window.electronAPI?.reportRendererFatal === "function") {
            window.electronAPI.reportRendererFatal(payload);
          }
        };

        const showFailure = (payload) => {
          const fatal = describeError(payload);
          ready = false;
          if (shell) {
            shell.hidden = false;
            shell.classList.add("spira-boot-failure-mode");
          }
          if (root) {
            root.hidden = true;
            root.removeAttribute("data-spira-ready");
          }
          if (titleNode) {
            titleNode.textContent = fatal.title;
          }
          if (messageNode) {
            messageNode.textContent = `${fatal.message} Reload Spira to try again.`;
          }
          const details = trimDetails(fatal.details);
          if (detailsNode) {
            detailsNode.textContent = details;
            detailsNode.hidden = details.length === 0;
          }
          if (reloadButton) {
            reloadButton.hidden = false;
          }
          reportFatal(fatal);
        };

        if (reloadButton) {
          reloadButton.addEventListener("click", () => {
            window.location.reload();
          });
        }

        window.__spiraRendererBoot = {
          markReady() {
            ready = true;
            if (root) {
              root.hidden = false;
              window.requestAnimationFrame(() => {
                root.setAttribute("data-spira-ready", "true");
              });
            }
            if (shell) {
              window.setTimeout(() => {
                shell.hidden = true;
              }, 360);
            }
          },
          showFailure,
          isReady() {
            return ready;
          },
        };

        window.addEventListener("error", (event) => {
          if (ready) {
            return;
          }
          showFailure(event.error || event.message);
        });

        window.addEventListener("unhandledrejection", (event) => {
          if (ready) {
            return;
          }
          showFailure(event.reason);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
