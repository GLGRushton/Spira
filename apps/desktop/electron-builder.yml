appId: com.glgrushton.spira
productName: Spira
copyright: Copyright © 2025 GLG Rushton

directories:
  output: dist
  buildResources: apps/desktop/assets

files:
  - packages/main/dist/**/*
  - packages/mcp-util/dist/**/*
  - packages/mcp-sql-server/dist/**/*
  - packages/renderer/dist/**/*
  - packages/shared/dist/**/*
  - packages/memory-db/dist/**/*
  - packages/backend/dist/**/*
  - packages/mcp-memories/dist/**/*
  - packages/mcp-nexus-mods/dist/**/*
  - packages/mcp-spira-ui/dist/**/*
  - packages/mcp-vision/dist/**/*
  - packages/mcp-windows/dist/**/*
  - packages/mcp-windows-ui/dist/**/*
  - assets/wake-word/openwakeword/**/*
  - assets/wake-word/openwakeword-runtime/**/*
  - mcp-servers.json
  - "!node_modules/.cache"
  - "!**/*.ts"
  - "!**/*.map"
  - "!**/*.d.ts"

asarUnpack:
  - packages/backend/dist/**/*
  - packages/mcp-util/dist/**/*
  - packages/mcp-sql-server/dist/**/*
  - packages/memory-db/dist/**/*
  - packages/mcp-nexus-mods/dist/**/*
  - packages/mcp-vision/dist/**/*
  - packages/mcp-memories/dist/**/*
  - packages/mcp-spira-ui/dist/**/*
  - packages/mcp-windows/dist/**/*
  - packages/mcp-windows-ui/dist/**/*
  - assets/wake-word/openwakeword/**/*
  - assets/wake-word/openwakeword-runtime/**/*
  - node_modules/@picovoice/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/nodejs-whisper/**/*
  - node_modules/speaker/**/*
  - node_modules/@github/copilot-sdk/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  # Replace this placeholder with a real Windows .ico before shipping installers.
  icon: apps/desktop/assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Spira

publish:
  provider: github
  owner: GLGRushton
  repo: Spira
